<!DOCTYPE html>
<html lang="ar" dir="rtl">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الفعالية</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">دليل الفعاليات</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">كل الفعاليات</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">عن الدليل</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">اتصل بنا</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="py-5 bg-light border-bottom">
        <div class="container text-center">
            <h2 class="fw-bold text-primary" id="eventTitle">عنوان الفعالية</h2>
            <p class="text-muted" id="eventShortInfo">تاريخ - مكان</p>
        </div>
    </header>

    <!-- Event Details -->
    <section class="py-5">
        <div class="container">

            <div class="row">

                <!-- Left column -->
                <div class="col-lg-8">

                    <!-- Main image -->
                    <img id="eventImage" src="" class="img-fluid rounded mb-4" alt="Event Image">

                    <!-- Description -->
                    <h4 class="fw-bold mb-3">وصف الفعالية</h4>
                    <p id="eventDescription" class="text-muted">
                        <!-- يتم تعبئته من main.js -->
                    </p>

                    <!-- Gallery -->
                    <h5 class="fw-bold mt-4 mb-3">معرض الصور</h5>
                    <div class="row g-3" id="eventGallery">
                        <!-- يتم تعبئته من main.js -->
                    </div>

                </div>

                <!-- Right Column -->
                <div class="col-lg-4">

                    <div class="card mb-4">
                        <div class="card-body">

                            <h5 class="fw-bold mb-3">معلومات الفعالية</h5>

                            <p><strong>التاريخ:</strong> <span id="eventDate"></span></p>
                            <p><strong>الوقت:</strong> <span id="eventTime"></span></p>
                            <p><strong>المكان:</strong> <span id="eventLocation"></span></p>
                            <p><strong>التصنيف:</strong> <span id="eventCategory"></span></p>

                        </div>
                    </div>
                    <!-- Buttons -->
                    <a id="addToCalendarBtn" class="btn btn-outline-primary w-100 mb-2" target="_blank">
                        أضف إلى التقويم
                    </a>


                    <button id="shareBtn" class="btn btn-outline-secondary w-100 mb-4">
                        شارك
                    </button>


                    <!-- Static Map -->
                    <div class="card">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3">الخريطة</h6>
                            <img src="" id="eventMap" class="img-fluid rounded" alt="Map">
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </section>

    <!-- Related Events -->
    <section class="py-5 bg-light">
        <div class="container">
            <h4 class="fw-bold mb-4 text-primary">فعاليات ذات صلة</h4>

            <div class="row" id="relatedEvents"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-primary text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1">© 2026 دليل فعاليات الجامعة الافتراضية</p>
            <p class="small">البريد: info@university-events.com</p>
        </div>
    </footer>

    <!-- Bootstrap + JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="assets/js/main.js"></script>

</body>

</html>
